<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindreader</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background: #efefef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1d1d1d;
    }

    .wrapper {
      width: 100%;
      max-width: 620px;
    }

    .brand {
      text-align: center;
      color: #7a7a7a;
      letter-spacing: 0.22em;
      font-size: 1.35rem;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .card {
      background: #fff;
      border-radius: 32px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      padding: 34px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: #8a8a8a;
      font-size: 1.2rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-bottom: 26px;
    }

    .number-input,
    .read-btn,
    .try-btn {
      border-radius: 20px;
      border: 1px solid #dddddd;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .number-input {
      height: 82px;
      padding: 0 24px;
      font-size: 2.2rem;
      color: #666666;
      outline: none;
      background: white;
      width: 100%;
    }

    .number-input:focus {
      border-color: #c9c9c9;
    }

    .read-btn {
      height: 82px;
      min-width: 220px;
      padding: 0 28px;
      font-size: 2rem;
      font-weight: 500;
      background: #a8a8a8;
      color: white;
      cursor: pointer;
    }

    .read-btn:hover:not(:disabled) {
      background: #969696;
    }

    .read-btn:disabled,
    .number-input:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    .progress-wrap {
      margin-bottom: 28px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-track {
      flex: 1;
      height: 16px;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #111111;
      border-radius: 999px;
      transition: width 0.55s ease-in-out;
    }

    .progress-text {
      min-width: 76px;
      text-align: right;
      color: #666666;
      font-size: 2rem;
    }

    .log {
      min-height: 470px;
      background: #fcfcfc;
      border: 1px solid #f1f1f1;
      border-radius: 24px;
      overflow: hidden;
    }

    .log-line,
    .log-loading {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 20px;
      font-size: 1.05rem;
      border-bottom: 1px solid #f3f3f3;
      background: rgba(255, 255, 255, 0.8);
      animation: fadeInUp 0.35s ease;
    }

    .log-line .bullet {
      color: #8b8b8b;
      margin-top: 1px;
      flex: 0 0 auto;
    }

    .log-loading {
      color: #555555;
      background: #fbfbfb;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid #cfcfcf;
      border-top-color: #555555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    .result {
      display: none;
      margin-top: 24px;
      padding-top: 30px;
      border-top: 1px solid #eeeeee;
      text-align: center;
      animation: fadeInUp 0.45s ease;
    }

    .brain {
      font-size: 3.2rem;
      margin-bottom: 12px;
      animation: popIn 0.35s ease;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 600;
      line-height: 1.2;
    }

    .result-title strong {
      font-weight: 900;
    }

    .result-sub {
      margin: 0 0 22px;
      color: #8a8a8a;
      font-size: 1.15rem;
    }

    .try-btn {
      height: 50px;
      padding: 0 24px;
      font-size: 1.1rem;
      color: #333333;
      background: white;
      cursor: pointer;
    }

    .try-btn:hover {
      background: #f6f6f6;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 680px) {
      .card {
        padding: 24px;
        border-radius: 28px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .read-btn {
        min-width: 0;
        width: 100%;
      }

      .progress-text {
        font-size: 1.5rem;
        min-width: 60px;
      }

      .log {
        min-height: 430px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">MINDREADER™</div>

    <div class="card">
      <div class="hero">
        <h1>Think of a number</h1>
        <p>1-19 pls</p>
      </div>

      <div class="controls">
        <input id="numberInput" class="number-input" type="text" inputmode="numeric" maxlength="2" placeholder="9" />
        <button id="readBtn" class="read-btn">Read Mind</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-row">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <div id="progressText" class="progress-text">0%</div>
        </div>
      </div>

      <div id="log" class="log"></div>

      <div id="result" class="result">
        <div class="brain">🧠</div>
        <h2 class="result-title">Yep, definitely <strong id="resultNumber"></strong>.</h2>
        <p class="result-sub">meow?</p>
        <button id="tryBtn" class="try-btn">↩ Try Again</button>
      </div>
    </div>
  </div>

  <script>
    const hilariousSteps = [
      "Warming up neural network...",
      "Reading search history...",
      "Intercepting thoughts...",
      "Signal lost. Reconnecting...",
      "Asking AI...",
      "AI said 'It's definitely not 11.'",
      "Cross-referencing with your spirit guide...",
      "Checking your facecam for hints...",
      "Consulting a psychic (backup)...",
      "Psychic was wrong. Ignoring.",
      "Measuring forehead Wi-Fi strength...",
      "Bribing your subconscious for cooperation...",
      "Comparing aura against premium casino data...",
      "Requesting access to forbidden brain folder...",
      "Waiting for the number to stop hiding...",
      "Running final algorithm...",
      "Compiling answer..."
    ];

    const numberInput = document.getElementById('numberInput');
    const readBtn = document.getElementById('readBtn');
    const log = document.getElementById('log');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const result = document.getElementById('result');
    const resultNumber = document.getElementById('resultNumber');
    const tryBtn = document.getElementById('tryBtn');

    let isReading = false;
    let progress = 0;
    let progressInterval = null;
    let timers = [];

    function setProgress(value) {
      progress = Math.max(0, Math.min(100, value));
      progressBar.style.width = progress + '%';
      progressText.textContent = progress + '%';
    }

    function addLogLine(text) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = '<span class="bullet">•</span><span>' + text + '</span>';
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function addLoadingLine() {
      const line = document.createElement('div');
      line.className = 'log-loading';
      line.id = 'loadingLine';
      line.innerHTML = '<span class="spinner"></span><span>Finalizing calculations...</span>';
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function clearLoadingLine() {
      const loadingLine = document.getElementById('loadingLine');
      if (loadingLine) loadingLine.remove();
    }

    function resetMindreader() {
      timers.forEach(clearTimeout);
      timers = [];
      if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
      }
      isReading = false;
      progress = 0;
      setProgress(0);
      log.innerHTML = '';
      result.style.display = 'none';
      numberInput.value = '';
      readBtn.disabled = false;
      numberInput.disabled = false;
    }

    function startReading() {
      const value = numberInput.value.trim();
      if (!value || isReading) return;

      isReading = true;
      log.innerHTML = '';
      result.style.display = 'none';
      setProgress(0);
      readBtn.disabled = true;
      numberInput.disabled = true;

      const totalSteps = hilariousSteps.length;
      let displayedStepCount = 0;

      progressInterval = setInterval(() => {
        const targetBase = displayedStepCount === 0 ? 4 : (displayedStepCount / totalSteps) * 88;
        const randomSwing = Math.floor(Math.random() * 17) - 8;
        const nudged = progress + randomSwing;
        const blended = Math.round((nudged + targetBase) / 2);
        setProgress(Math.max(0, Math.min(97, blended)));
      }, 380);

      hilariousSteps.forEach((step, index) => {
        const timer = setTimeout(() => {
          displayedStepCount = index + 1;
          addLogLine(step);
          const target = Math.round(((index + 1) / totalSteps) * 90);
          const bump = Math.floor(Math.random() * 9) - 4;
          setProgress(Math.max(progress, Math.max(0, Math.min(97, target + bump))));

          if (index === totalSteps - 1) {
            addLoadingLine();
          }
        }, index * 900);
        timers.push(timer);
      });

      const finalTimer = setTimeout(() => {
        if (progressInterval) {
          clearInterval(progressInterval);
          progressInterval = null;
        }
        setProgress(100);

        setTimeout(() => {
          clearLoadingLine();
          resultNumber.textContent = value;
          result.style.display = 'block';
          isReading = false;
          readBtn.disabled = false;
          numberInput.disabled = false;
        }, 500);
      }, totalSteps * 900 + 900);

      timers.push(finalTimer);
    }

    numberInput.addEventListener('input', () => {
      numberInput.value = numberInput.value.replace(/[^0-9]/g, '').slice(0, 2);
    });

    readBtn.addEventListener('click', startReading);
    tryBtn.addEventListener('click', resetMindreader);
  </script>
</body>
</html>
